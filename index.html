<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>Cransfield Materials Testing Center</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Fallback: Show a message if the app fails to render
      document.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
          const root = document.getElementById('root');
          if (!root || !root.innerHTML.trim()) {
            const fallback = document.createElement('div');
            fallback.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#f5f5f5;font-family:system-ui,sans-serif;z-index:9999;';
            fallback.innerHTML = '<div style="text-align:center;background:white;padding:40px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1);"><p style="margin:0;color:#333;font-size:16px;font-weight:500;">Loading application...</p></div>';
            document.body.appendChild(fallback);
          }
        }, 3000);
      });
    </script>
  </body>
</html>
